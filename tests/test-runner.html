<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testes — Calculadora CO₂</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pass:       #16a34a;
      --pass-light: #dcfce7;
      --fail:       #dc2626;
      --fail-light: #fef2f2;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-700:   #374151;
      --gray-900:   #111827;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 2rem 1rem 1.5rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem; }
    header p  { font-size: 0.875rem; color: var(--gray-700); margin-bottom: 1rem; }

    .summary-box {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.625rem;
      font-weight: 600;
    }
    .all-pass { background: var(--pass-light); color: var(--pass); }
    .has-fail { background: var(--fail-light); color: var(--fail); }
    .summary-score { font-size: 1.375rem; font-weight: 800; }
    .summary-fail-badge {
      background: var(--fail);
      color: #fff;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }

    /* ── Results ── */
    #results {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .suite {
      background: #fff;
      border-radius: 0.75rem;
      box-shadow: 0 1px 3px rgb(0 0 0/0.08);
      overflow: hidden;
    }
    .suite-header {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--gray-100);
      font-size: 0.9375rem;
    }
    .suite-ok  { background: var(--pass-light); }
    .suite-err { background: var(--fail-light); }
    .suite-name { flex: 1; font-weight: 600; }
    .suite-count { font-size: 0.8125rem; opacity: 0.7; }

    .suite-tests { padding: 0.375rem 0; }

    .test {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.5rem;
      padding: 0.4375rem 1.25rem;
      font-size: 0.875rem;
    }
    .test + .test { border-top: 1px solid var(--gray-50); }
    .test.fail { background: #fff5f5; }
    .test-icon { font-size: 0.875rem; font-weight: 700; width: 1rem; flex-shrink: 0; }
    .test.pass .test-icon { color: var(--pass); }
    .test.fail .test-icon { color: var(--fail); }
    .test-name { flex: 1; }
    .test-error {
      width: 100%;
      margin-left: 1.5rem;
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 0.75rem;
      color: var(--fail);
      background: #fff;
      border-left: 3px solid var(--fail);
      padding: 0.375rem 0.625rem;
      border-radius: 0 0.25rem 0.25rem 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <header>
    <h1>🧪 Testes — Calculadora CO₂</h1>
    <p>Abre este arquivo diretamente no navegador para executar todos os testes.</p>
    <div id="summary">Executando testes…</div>
  </header>

  <div id="results"></div>

  <!-- Módulos da aplicação (sem DOM) -->
  <script src="../js/config.js"></script>
  <script src="../js/routes-data.js"></script>
  <script src="../js/calculator.js"></script>

  <!-- Framework de testes -->
  <script src="test-runner.js"></script>

  <!-- Suítes de testes -->
  <script src="config.test.js"></script>
  <script src="calculator.test.js"></script>
  <script src="routes.test.js"></script>

  <!-- Executa e renderiza -->
  <script>TestRunner.run();</script>
</body>
</html>
